<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Copa 2026 - Simulador ESP32</title>
    <style>
        /* Fundo da página */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Container simulando a tela ST7735 (Proporção 256x320) */
        .tft-screen {
            width: 256px;
            height: 320px;
            background-color: #000000;
            border: 10px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Cabeçalho */
        .header {
            background-color: #006400; /* TFT_DARKGREEN */
            color: #FFFFFF;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #FFFFFF;
            flex-shrink: 0;
        }

        /* Área de Listagem com Scroll nativo escondido */
        .game-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 5px;
            background-color: #000;
        }
        
        /* Esconde a barra de rolagem visualmente, mas permite o scroll */
        .game-list::-webkit-scrollbar { width: 0px; }

        /* Card individual de cada partida */
        .match-card {
            border-bottom: 1px dashed #555;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .match-card:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .status {
            color: #FFA500; /* TFT_ORANGE */
            font-size: 14px;
            margin-bottom: 10px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            color: #FFFFFF;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .team-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        .team-name {
            font-size: 16px;
            font-weight: bold;
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            width: 20%;
            text-align: center;
        }

        /* Rodapé */
        .footer {
            background-color: #A9A9A9; /* TFT_DARKGREY */
            color: #FFFFFF;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        #debug-log {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00FF00;
            max-width: 200px;
        }
    </style>
</head>
<body>

    <div id="debug-log">Iniciando sistema...</div>

    <div class="tft-screen">
        <div class="header">COPA 2026</div>
        
        <div class="game-list" id="game-list">
            <div style="color: white; text-align: center; margin-top: 50px;">Carregando dados...</div>
        </div>

        <div class="footer">Atualizando ao vivo</div>
    </div>

    <script>
        const API_KEY = 'c8c8ceefe660433b89725c5c225fffa7';
        
        // Proxy CORS para não ser bloqueado pelo navegador + Filtro da Copa (WC)
        const URL = 'https://corsproxy.io/?https://api.football-data.org/v4/matches?competitions=WC';

        async function buscarDadosCopa() {
            const debugLog = document.getElementById('debug-log');
            const gameList = document.getElementById('game-list');
            
            debugLog.innerText = "Buscando partidas...";

            try {
                const response = await fetch(URL, {
                    method: 'GET',
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const data = await response.json();
                debugLog.innerText = `Sucesso! Jogos encontrados: ${data.resultSet.count}`;
                
                // Limpa a tela de "Carregando"
                gameList.innerHTML = '';

                if (data.resultSet.count > 0) {
                    
                    // Cria a listagem varrendo todas as partidas de hoje
                    data.matches.forEach(match => {
                        
                        // Extração de dados com proteção contra nulos
                        const siglaHome = match.homeTeam.tla || "---";
                        const siglaAway = match.awayTeam.tla || "---";
                        const logoHome = match.homeTeam.crest || "";
                        const logoAway = match.awayTeam.crest || "";
                        
                        const golHome = match.score.fullTime.home !== null ? match.score.fullTime.home : "0";
                        const golAway = match.score.fullTime.away !== null ? match.score.fullTime.away : "0";

                        // Tradução de Status
                        let statusTela = "Aguardando";
                        if (match.status === "IN_PLAY") statusTela = "Ao Vivo";
                        else if (match.status === "PAUSED") statusTela = "Intervalo";
                        else if (match.status === "FINISHED") statusTela = "Encerrado";
                        else if (match.status === "TIMED") statusTela = "Marcado (Hoje)";

                        // Montando o HTML do Card da Partida
                        const cardHTML = `
                            <div class="match-card">
                                <div class="status">${statusTela}</div>
                                <div class="scoreboard">
                                    <div class="team">
                                        <img src="${logoHome}" class="team-logo" alt="${siglaHome}">
                                        <div class="team-name">${siglaHome}</div>
                                    </div>
                                    <div class="score">${golHome} - ${golAway}</div>
                                    <div class="team">
                                        <img src="${logoAway}" class="team-logo" alt="${siglaAway}">
                                        <div class="team-name">${siglaAway}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        gameList.innerHTML += cardHTML;
                    });

                } else {
                    gameList.innerHTML = '<div style="color: #FFA500; text-align: center; margin-top: 50px; font-size: 16px;">Sem jogos da Copa<br>programados para hoje.</div>';
                }

            } catch (erro) {
                console.error("Falha:", erro);
                debugLog.innerText = `Erro: ${erro.message}`;
                debugLog.style.color = "#FF0000";
                gameList.innerHTML = '<div style="color: #FF0000; text-align: center; margin-top: 50px;">ERRO DE REDE<br>Verifique o Proxy/API</div>';
            }
        }

        // Chamada inicial
        buscarDadosCopa();

        // Atualiza os dados a cada 60 segundos
        setInterval(buscarDadosCopa, 60000);
    </script>

</body>
</html>
