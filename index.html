<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Copa 2026 - Simulador Fiel</title>
    <style>
        /* Fundo da página */
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Container simulando a tela ST7735 (Proporção Exata 2x: 256x320) */
        .tft-screen {
            width: 256px;
            height: 320px;
            background-color: #000000; /* TFT_BLACK */
            border: 10px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        /* tft.fillRect(0, 0, 128, 25, TFT_DARKGREEN); */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px; /* 25 * 2 */
            background-color: #006400;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #FFFFFF; /* tft.drawLine(...) */
        }

        /* tft.drawCentreString(status, 64, 38, 1); */
        .status {
            position: absolute;
            top: 76px; /* 38 * 2 */
            width: 100%;
            text-align: center;
            color: #FFA500; /* TFT_ORANGE */
            font-size: 16px;
        }

        /* Nomes dos Times (Y = 65) */
        .team-a, .team-b {
            position: absolute;
            top: 130px; /* 65 * 2 */
            color: #FFFFFF; /* TFT_WHITE */
            font-size: 24px;
            font-weight: bold;
            width: 60px;
            text-align: center;
            transform: translateX(-50%); /* Centraliza no ponto exato */
        }
        
        .team-a { left: 60px; /* 30 * 2 */ }
        .team-b { left: 196px; /* 98 * 2 */ }

        /* Placares - Números Gigantes (Y = 90) */
        .score-a, .score-b {
            position: absolute;
            top: 180px; /* 90 * 2 */
            color: #FFFFFF; /* TFT_WHITE */
            font-size: 48px; /* Simulando LOAD_FONT4 */
            font-weight: bold;
            width: 60px;
            text-align: center;
            transform: translateX(-50%);
        }

        .score-a { left: 60px; }
        .score-b { left: 196px; }

        /* O 'X' no meio (Y = 95) */
        .versus {
            position: absolute;
            top: 190px; /* 95 * 2 */
            left: 128px; /* 64 * 2 */
            color: #FF0000; /* TFT_RED */
            font-size: 28px;
            font-weight: bold;
            transform: translateX(-50%);
        }

        /* tft.fillRect(0, 145, 128, 15, TFT_DARKGREY); */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px; /* 15 * 2 */
            background-color: #696969; /* TFT_DARKGREY */
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        #debug-log {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00FF00;
        }
    </style>
</head>
<body>

    <div id="debug-log">Pronto para buscar dados...</div>

    <div class="tft-screen">
        <div class="header">COPA 2026</div>
        
        <div class="status" id="status-text">Carregando...</div>
        
        <div class="team-a" id="team-a">---</div>
        <div class="team-b" id="team-b">---</div>
        
        <div class="score-a" id="score-a">0</div>
        <div class="versus">X</div>
        <div class="score-b" id="score-b">0</div>
        
        <div class="footer">Atualizando ao vivo</div>
    </div>

    <script>
        const API_KEY = 'c8c8ceefe660433b89725c5c225fffa7';
        // URL da API com Proxy CORS para rodar no navegador
        const URL = 'https://corsproxy.io/?https://api.football-data.org/v4/matches?competitions=WC';

        async function buscarDadosCopa() {
            const debugLog = document.getElementById('debug-log');
            debugLog.innerText = "Sincronizando com a API...";

            try {
                const response = await fetch(URL, {
                    method: 'GET',
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);

                const data = await response.json();
                debugLog.innerText = "Atualizado com sucesso!";

                if (data.resultSet.count > 0) {
                    const match = data.matches[0]; // Pega a primeira partida

                    document.getElementById('team-a').innerText = match.homeTeam.tla || "---";
                    document.getElementById('team-b').innerText = match.awayTeam.tla || "---";

                    const golHome = match.score.fullTime.home;
                    const golAway = match.score.fullTime.away;
                    
                    document.getElementById('score-a').innerText = golHome !== null ? golHome : "0";
                    document.getElementById('score-b').innerText = golAway !== null ? golAway : "0";

                    let statusAPI = match.status;
                    let statusTela = "Aguardando";
                    
                    if (statusAPI === "IN_PLAY") statusTela = "Ao Vivo";
                    else if (statusAPI === "PAUSED") statusTela = "Intervalo";
                    else if (statusAPI === "FINISHED") statusTela = "Encerrado";
                    else if (statusAPI === "TIMED") statusTela = "Hoje";

                    document.getElementById('status-text').innerText = statusTela;

                } else {
                    document.getElementById('status-text').innerText = "Sem jogos hoje";
                    document.getElementById('team-a').innerText = "---";
                    document.getElementById('team-b').innerText = "---";
                    document.getElementById('score-a').innerText = "0";
                    document.getElementById('score-b').innerText = "0";
                }

            } catch (erro) {
                console.error("Falha:", erro);
                debugLog.innerText = `Erro: ${erro.message}`;
                debugLog.style.color = "#FF0000";
                document.getElementById('status-text').innerText = "ERRO DE REDE";
            }
        }

        buscarDadosCopa();
        setInterval(buscarDadosCopa, 30000); // 30 segundos, igual ao C++
    </script>
</body>
</html>
