<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Copa 2026</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .tft-screen {
            width: 320px;
            height: 480px; 
            background-color: #000000;
            border: 10px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            background-color: #006400;
            color: #FFFFFF;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #FFFFFF;
            flex-shrink: 0;
        }

        .game-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #000;
        }
        .game-list::-webkit-scrollbar { width: 0px; }

        .history-block {
            background-color: #1c1c1c;
            border-top: 2px dashed #555;
            padding: 10px;
            flex-shrink: 0;
        }

        .history-title {
            color: #A9A9A9;
            font-size: 12px;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-block {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px 5px;
            margin-bottom: 10px;
            color: #FFF;
        }

        .match-block.live {
            border-color: #FFA500;
            background-color: #221500;
        }

        .team-side {
            display: flex;
            align-items: center;
            width: 30%;
        }
        .team-side.right {
            justify-content: flex-end;
        }

        .team-logo {
            width: 25px;
            height: 25px;
            object-fit: contain;
            margin: 0 5px;
        }

        .tla {
            font-size: 16px;
            font-weight: bold;
        }

        .center-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
        }

        .score-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        .status-time {
            font-size: 12px;
            margin-top: 5px;
            color: #A9A9A9;
        }
        
        .live .status-time {
            color: #FFA500;
            font-weight: bold;
        }

        #debug-log {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00FF00;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="debug-log">Conectando...</div>

    <div class="tft-screen">
        <div class="header">COPA 2026</div>
        
        <div class="game-list" id="main-queue">
            <div style="color: white; text-align: center; margin-top: 50px;">Carregando...</div>
        </div>

        <div class="history-block">
            <div class="history-title">Último Resultado</div>
            <div id="history-content">
                <div style="color: #555; text-align: center; font-size: 12px;">Aguardando dados...</div>
            </div>
        </div>
    </div>

    <script>
        // Sua URL do Worker (Proxy Privado)
        const URL_PROXY = 'https://proud-sky-72e9.samuelrochalemes20042014.workers.dev/v4/matches?competitions=WC';

        let placaresAnteriores = {};
        const somGol = new Audio('assets/audio.mp3');
        
        function criarBlocoPartida(match, isLive = false) {
            const siglaA = match.homeTeam.tla || "---";
            const siglaB = match.awayTeam.tla || "---";
            const logoA = match.homeTeam.crest || "";
            const logoB = match.awayTeam.crest || "";
            
            const golA = match.score.fullTime.home !== null ? match.score.fullTime.home : "-";
            const golB = match.score.fullTime.away !== null ? match.score.fullTime.away : "-";

            let infoCentral = "";
            if (match.status === "IN_PLAY") infoCentral = "Ao Vivo";
            else if (match.status === "PAUSED") infoCentral = "Intervalo";
            else if (match.status === "FINISHED") infoCentral = "Encerrado";
            else {
                const dataJogo = new Date(match.utcDate);
                infoCentral = dataJogo.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            }

            return `
                <div class="match-block ${isLive ? 'live' : ''}">
                    <div class="team-side">
                        <img src="${logoA}" class="team-logo" alt="${siglaA}">
                        <span class="tla">${siglaA}</span>
                    </div>
                    <div class="center-info">
                        <div class="score-row"><span>${golA}</span><span style="font-size: 14px; color: #555;">x</span><span>${golB}</span></div>
                        <span class="status-time">${infoCentral}</span>
                    </div>
                    <div class="team-side right">
                        <span class="tla">${siglaB}</span>
                        <img src="${logoB}" class="team-logo" alt="${siglaB}">
                    </div>
                </div>
            `;
        }

        async function atualizarPainel() {
            const debugLog = document.getElementById('debug-log');
            const mainQueue = document.getElementById('main-queue');
            const historyContent = document.getElementById('history-content');
            
            const urlFinal = `${URL_PROXY}&nocache=${new Date().getTime()}`;

            try {
                const response = await fetch(urlFinal, { cache: 'no-store' });
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                debugLog.innerText = "Online";

                const aoVivo = [], proximos = [], encerrados = [];
                data.matches.forEach(m => {
                    if (m.status === "IN_PLAY" || m.status === "PAUSED") { aoVivo.push(m);
                        const golsCasa = m.score.fullTime.home !== null ? m.score.fullTime.home : 0;
                        const golsFora = m.score.fullTime.away !== null ? m.score.fullTime.away : 0;
                        const totalGolsAtuais = golsCasa + golsFora;

                        if (placaresAnteriores[m.id] !== undefined && totalGolsAtuais > placaresAnteriores[m.id]) {
                          somGol.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));
                        }
        

                        placaresAnteriores[m.id] = totalGolsAtuais;
                    }
                    else if (m.status === "FINISHED") encerrados.push(m);
                    else proximos.push(m);
                });

                proximos.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
                encerrados.sort((a, b) => new Date(b.utcDate) - new Date(a.utcDate));

                mainQueue.innerHTML = "";
                [...aoVivo, ...proximos].forEach(m => mainQueue.innerHTML += criarBlocoPartida(m, m.status === "IN_PLAY"));
                
                historyContent.innerHTML = encerrados.length > 0 ? criarBlocoPartida(encerrados[0]) : "Sem resultados";

            } catch (e) {
                debugLog.innerText = "Erro de conexão";
            }
        }

        atualizarPainel();
        setInterval(atualizarPainel, 30000); 
    </script>
</body>
</html>
